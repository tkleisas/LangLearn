name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV
          echo "Tag version: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug -PversionName=${{ env.VERSION_NAME }} --build-cache

      - name: Build release APK
        run: ./gradlew assembleRelease -PversionName=${{ env.VERSION_NAME }} --build-cache

      - name: Determine APK paths
        id: apk
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "DEBUG_APK=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "RELEASE_APK=$RELEASE_APK" >> $GITHUB_OUTPUT
          echo "Debug APK: $DEBUG_APK"
          echo "Release APK: $RELEASE_APK"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION_NAME }}"
          files: |
            ${{ steps.apk.outputs.DEBUG_APK }}
            ${{ steps.apk.outputs.RELEASE_APK }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(env.VERSION_NAME, '-') }}
