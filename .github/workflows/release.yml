name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV
          echo "Tag version: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease -PversionName=${{ env.VERSION_NAME }} --build-cache

      - name: Sign APK (if keystore configured)
        continue-on-error: true
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Determine APK path
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION_NAME }}"
          files: ${{ steps.apk.outputs.APK_PATH }}
          generateReleaseNotes: true
          draft: false
          prerelease: ${{ contains(env.VERSION_NAME, '-') }}
